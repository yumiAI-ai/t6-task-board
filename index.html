<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>每月工作看板</title>
  <style>
    :root{--ink:#183b3a;--muted:#7a817e;--paper:#fffdf8;--wash:#f5f1e8;--line:#e3dac9;--accent:#1f5551;--chip:#e6f0ec;--danger:#b44642}*{box-sizing:border-box}body{margin:0;background:#f3efe7;color:var(--ink);font:14px/1.45 Arial,"Microsoft YaHei",sans-serif}button,input,textarea{font:inherit}button{cursor:pointer}main{max-width:1600px;margin:auto;padding:28px 24px 48px}.top{display:flex;justify-content:space-between;gap:18px;align-items:flex-end;border-bottom:1px solid var(--line);padding-bottom:18px}.eyebrow{color:var(--muted);font-size:12px}.top h1{margin:4px 0 0;font-size:28px}.tabs{display:flex;border:1px solid var(--line);border-radius:7px;overflow:hidden}.tabs button{border:0;background:var(--paper);padding:9px 13px;color:var(--ink)}.tabs button+button{border-left:1px solid var(--line)}.tabs .active{background:var(--accent);color:#fff}.toolbar{display:flex;flex-wrap:wrap;gap:10px;align-items:end;margin:18px 0}.control{display:grid;gap:4px;color:var(--muted);font-size:12px}.control input{height:39px;border:1px solid var(--line);border-radius:6px;background:#fff;padding:0 10px;color:var(--ink)}#taskInput{width:min(420px,55vw)}.add{height:39px;border:0;border-radius:6px;background:var(--accent);color:white;font-weight:bold;padding:0 16px}.month-select{margin-left:auto;display:flex;gap:6px;align-items:center}.month-select button{width:32px;height:32px;border:1px solid var(--line);border-radius:5px;background:var(--paper);color:var(--ink)}.month-select select{height:32px;border:1px solid var(--line);border-radius:5px;background:var(--paper);color:var(--ink);padding:0 7px}.layout{display:grid;grid-template-columns:minmax(860px,1fr) minmax(270px,.32fr);gap:20px}.calendar-panel,.side-panel{background:var(--paper);border:1px solid var(--line);border-radius:8px;padding:20px}.month-title{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}.month-title h2{margin:0;font-size:20px}.month-title span{color:var(--muted)}.week-block{display:grid;grid-template-columns:minmax(155px,.55fr) minmax(570px,2.5fr) minmax(155px,.55fr);gap:8px;margin-bottom:9px}.week-label{display:block;min-height:100%;border:1px solid var(--line);border-radius:6px;background:#fbf8f1;padding:9px}.week-label strong{display:block;margin-bottom:6px;font-size:12px}.week-label textarea,.side-panel textarea{width:100%;min-height:92px;resize:vertical;border:0;border-top:1px solid var(--line);background:transparent;padding:7px 1px;outline:0;color:var(--ink)}.week-days{display:grid;grid-template-columns:repeat(7,minmax(0,1fr));gap:8px}.dow{grid-column:1/-1;display:grid;grid-template-columns:repeat(7,minmax(0,1fr));gap:8px;color:#616b68;font-weight:bold;font-size:12px}.dow span{text-align:left}.day{min-height:116px;border:1px solid var(--line);border-radius:7px;background:#fffdf8;padding:8px;overflow:hidden}.day.out{background:#f4f1ea;color:#9a9a94}.date{font-weight:bold;margin-bottom:6px}.task{display:flex;align-items:center;gap:4px;margin:4px 0;padding:4px 5px;border-radius:5px;background:var(--chip);color:#17504c;min-width:0}.task.done{background:#ecebe6;color:#81817b;text-decoration:line-through}.task span{flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}.task button{border:0;background:transparent;color:inherit;font-size:16px;line-height:15px;padding:0 1px}.note{width:100%;border:0;border-top:1px solid var(--line);background:transparent;padding:5px 0;outline:0;color:var(--muted);font-size:12px}.side-panel{height:max-content}.side-panel h3{margin:0 0 10px;font-size:15px}.side-panel section+section{border-top:1px solid var(--line);margin-top:14px;padding-top:14px}.side-panel textarea{min-height:150px;border:1px solid var(--line);border-radius:5px;padding:8px;background:#fff}.year-grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:16px}.mini{background:var(--paper);border:1px solid var(--line);border-radius:7px;padding:13px;min-width:0}.mini h3{margin:0 0 9px;font-size:16px}.mini .dow{font-size:10px;gap:3px}.mini .week-days{gap:3px}.mini .day{min-height:68px;padding:5px;border-radius:4px;font-size:11px}.mini .date{margin-bottom:3px}.mini .task{font-size:10px;padding:2px 3px;margin:2px 0}.mini .note,.mini .week-label{display:none}.hidden{display:none}@media(max-width:1180px){.layout{grid-template-columns:1fr}.side-panel{display:grid;grid-template-columns:1fr 1fr;gap:18px}.side-panel section+section{border-top:0;border-left:1px solid var(--line);margin:0;padding:0 0 0 18px}.year-grid{grid-template-columns:repeat(2,minmax(0,1fr))}}@media(max-width:800px){main{padding:18px 12px}.top{align-items:start;flex-direction:column}.toolbar{align-items:stretch}.month-select{margin-left:0}#taskInput{width:100%}.week-block{display:block}.week-label{margin:7px 0}.week-days{gap:4px}.dow{gap:4px}.day{min-height:86px;padding:5px;font-size:12px}.side-panel{display:block}.side-panel section+section{border-left:0;border-top:1px solid var(--line);margin-top:14px;padding:14px 0 0}.year-grid{grid-template-columns:1fr}.mini .day{min-height:62px}}
  </style>
</head>
<body>
  <main>
    <header class="top"><div><div class="eyebrow">2026 工作规划</div><h1>每月工作看板</h1></div><div class="tabs"><button class="active" data-view="month">月历</button><button data-view="year">4 - 12 月总览</button></div></header>
    <section class="toolbar"><label class="control">日期<input id="taskDate" type="date"></label><label class="control">新增任务<input id="taskInput" placeholder="输入任务名称"></label><button class="add" id="addTask">添加</button><div class="month-select"><button id="prev" title="上个月">‹</button><select id="month"></select><button id="next" title="下个月">›</button></div></section>
    <div id="monthView" class="layout"><section class="calendar-panel"><div class="month-title"><h2 id="heading"></h2><span id="period"></span></div><div id="calendar"></div></section><aside class="side-panel"><section><h3>待办</h3><textarea id="globalTodo" placeholder="记录本月待办..."></textarea></section><section><h3>完结</h3><textarea id="globalDone" placeholder="记录本月完结事项..."></textarea></section></aside></div>
    <section id="yearView" class="year-grid hidden"></section>
  </main>
  <script>
    const YEAR=2026, months=['一月','二月','三月','四月','五月','六月','七月','八月','九月','十月','十一月','十二月'];
    const initial=[['2026-06-01','接待'],['2026-06-03','接待'],['2026-06-22','仿品'],['2026-06-24','油厂'],['2026-06-25','预算会议'],['2026-06-29','PPT'],['2026-06-30','半年度复盘会议'],['2026-07-01','休假'],['2026-07-02','做复盘 PPT'],['2026-07-02','36 外壳'],['2026-07-02','跟进法规'],['2026-07-03','CM / F 衍生'],['2026-07-03','Newsletter'],['2026-07-07','培训'],['2026-07-08','两封邮件'],['2026-07-08','培训'],['2026-07-09','培训'],['2026-07-10','培训'],['2026-07-13','客户来访'],['2026-07-15','HK 递签'],['2026-07-25','德国出差'],['2026-07-26','德国出差'],['2026-08-01','德国出差'],['2026-08-02','德国出差'],['2026-08-16','德国出差'],['2026-08-30','德国出差'],['2026-11-11','家长会']].map(([date,text],i)=>({id:'seed-'+i,date,text}));
    const get=(key,fallback)=>{try{return JSON.parse(localStorage.getItem(key))??fallback}catch{return fallback}}, set=(key,value)=>localStorage.setItem(key,JSON.stringify(value));
    let current=6, custom=get('t6-custom-tasks',[]), deleted=get('t6-deleted-tasks',[]), done=get('t6-done-tasks',[]), notes=get('t6-day-notes',{}), weeks=get('t6-week-notes',{});
    const $=id=>document.getElementById(id), key=d=>`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`, safe=s=>String(s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
    for(let i=3;i<12;i++)$('month').insertAdjacentHTML('beforeend',`<option value="${i}">${months[i]} ${YEAR}</option>`);$('month').value=current;
    $('taskDate').value='2026-07-01'; $('globalTodo').value=localStorage.getItem('t6-board-todo-text')||''; $('globalDone').value=localStorage.getItem('t6-board-done-text')||'';
    function tasks(date){return [...initial,...custom].filter(t=>t.date===date&&!deleted.includes(t.id))}
    function dow(){return '<div class="dow"><span>周日</span><span>周一</span><span>周二</span><span>周三</span><span>周四</span><span>周五</span><span>周六</span></div>'}
    function weekHtml(days,weekId,mini=false){let cells=days.map(d=>{let ds=key(d), inMonth=d.getMonth()===current, ts=tasks(ds);return `<div class="day ${inMonth?'':'out'}"><div class="date">${d.getDate()}</div>${ts.map(t=>`<div class="task ${done.includes(t.id)?'done':''}" title="${safe(t.text)}"><button onclick="toggle('${t.id}')" title="完成">${done.includes(t.id)?'↺':'✓'}</button><span>${safe(t.text)}</span><button onclick="removeTask('${t.id}')" title="删除">×</button></div>`).join('')}${inMonth&&!mini?`<input class="note" value="${safe(notes[ds]||'')}" placeholder="当天记录" onchange="saveNote('${ds}',this.value)">`:''}</div>`}).join('');return `${!mini?dow():''}<div class="week-days">${cells}</div>`}
    function render(){ $('heading').textContent=months[current]+'月历'; $('period').textContent=`${YEAR}-${String(current+1).padStart(2,'0')}`;let start=new Date(YEAR,current,1);start.setDate(start.getDate()-start.getDay());let html='';for(let w=0;w<6;w++){let days=Array.from({length:7},(_,i)=>new Date(YEAR,current,1-start.getDay()+w*7+i));if(w>0&&days[0].getMonth()!==current&&days[6].getMonth()!==current)break;let id=`${YEAR}-${current}-${w}`;html+=`<div class="week-block"><label class="week-label"><strong>本周待办</strong><textarea placeholder="写下本周待办..." onchange="saveWeek('${id}-todo',this.value)">${safe(weeks[id+'-todo']||'')}</textarea></label><div>${weekHtml(days,id)}</div><label class="week-label"><strong>本周完结</strong><textarea placeholder="写下本周完结..." onchange="saveWeek('${id}-done',this.value)">${safe(weeks[id+'-done']||'')}</textarea></label></div>`}$('calendar').innerHTML=html;renderYear()}
    function renderYear(){let out='';for(let m=3;m<12;m++){let start=new Date(YEAR,m,1);start.setDate(start.getDate()-start.getDay());let weeksHtml='';for(let w=0;w<6;w++){let days=Array.from({length:7},(_,i)=>new Date(YEAR,m,1-start.getDay()+w*7+i));if(w>0&&days[0].getMonth()!==m&&days[6].getMonth()!==m)break;let old=current;current=m;weeksHtml+=weekHtml(days,'',true);current=old}out+=`<article class="mini"><h3>${months[m]} ${YEAR}</h3>${dow()}${weeksHtml}</article>`}$('yearView').innerHTML=out}
    window.saveNote=(date,value)=>{notes[date]=value;set('t6-day-notes',notes)};window.saveWeek=(id,value)=>{weeks[id]=value;set('t6-week-notes',weeks)};window.toggle=id=>{done=done.includes(id)?done.filter(x=>x!==id):[...done,id];set('t6-done-tasks',done);render()};window.removeTask=id=>{deleted=[...new Set([...deleted,id])];set('t6-deleted-tasks',deleted);custom=custom.filter(t=>t.id!==id);set('t6-custom-tasks',custom);render()};
    $('addTask').onclick=()=>{let date=$('taskDate').value,text=$('taskInput').value.trim();if(!date||!text)return;custom.push({id:'custom-'+Date.now(),date,text});set('t6-custom-tasks',custom);$('taskInput').value='';current=Number(date.slice(5,7))-1;$('month').value=current;render()};$('taskInput').addEventListener('keydown',e=>{if(e.key==='Enter')$('addTask').click()});$('month').onchange=e=>{current=Number(e.target.value);render()};$('prev').onclick=()=>{current=current===3?11:current-1;$('month').value=current;render()};$('next').onclick=()=>{current=current===11?3:current+1;$('month').value=current;render()};$('globalTodo').oninput=e=>localStorage.setItem('t6-board-todo-text',e.target.value);$('globalDone').oninput=e=>localStorage.setItem('t6-board-done-text',e.target.value);document.querySelectorAll('[data-view]').forEach(b=>b.onclick=()=>{document.querySelectorAll('[data-view]').forEach(x=>x.classList.toggle('active',x===b));$('monthView').classList.toggle('hidden',b.dataset.view==='year');$('yearView').classList.toggle('hidden',b.dataset.view!=='year')});render();
  </script>
</body>
</html>
