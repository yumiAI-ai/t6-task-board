<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>每月工作看板</title>
  <style>
    :root{--ink:#183b3a;--muted:#687572;--paper:#fffdf8;--wash:#f5f1e8;--line:#d9ddd3;--accent:#1f5551;--chip:#e1f0eb;--blue:#e5effa;--blue-ink:#28587d;--amber:#fff0c7;--amber-ink:#845b10;--done:#e5f3df;--danger:#b44642}*{box-sizing:border-box}body{margin:0;background:#f1f3ee;color:var(--ink);font:14px/1.45 Arial,"Microsoft YaHei",sans-serif}button,input,textarea{font:inherit}button{cursor:pointer}main{max-width:1600px;margin:auto;padding:28px 24px 48px}.top{display:flex;justify-content:space-between;gap:18px;align-items:flex-end;border-bottom:1px solid var(--line);padding-bottom:18px}.eyebrow{color:var(--blue-ink);font-size:12px;font-weight:bold}.top h1{margin:4px 0 0;font-size:28px}.tabs{display:flex;border:1px solid var(--line);border-radius:7px;overflow:hidden}.tabs button{border:0;background:var(--paper);padding:9px 13px;color:var(--ink)}.tabs button+button{border-left:1px solid var(--line)}.tabs .active{background:var(--accent);color:#fff}.toolbar{display:flex;flex-wrap:wrap;gap:10px;align-items:end;margin:18px 0}.control{display:grid;gap:4px;color:var(--muted);font-size:12px}.control input{height:39px;border:1px solid var(--line);border-radius:6px;background:#fff;padding:0 10px;color:var(--ink)}#taskInput{width:min(420px,55vw)}.add{height:39px;border:0;border-radius:6px;background:var(--accent);color:white;font-weight:bold;padding:0 16px}.backup-actions{display:flex;gap:6px}.backup-actions button{height:39px;border:1px solid #b9cad7;border-radius:6px;background:var(--blue);color:var(--blue-ink);font-weight:bold;padding:0 11px}.backup-actions button:hover{border-color:var(--blue-ink);background:#d7e8f8}.month-select{margin-left:auto;display:flex;gap:6px;align-items:center}.month-select button{width:32px;height:32px;border:1px solid var(--line);border-radius:5px;background:var(--paper);color:var(--ink)}.month-select select{height:32px;border:1px solid var(--line);border-radius:5px;background:var(--paper);color:var(--ink);padding:0 7px}.layout{display:grid;grid-template-columns:minmax(860px,1fr) minmax(270px,.32fr);gap:20px}.calendar-panel,.side-panel{background:var(--paper);border:1px solid var(--line);border-radius:8px;padding:20px}.month-title{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}.month-title h2{margin:0;font-size:20px}.month-title span{color:var(--blue-ink);font-weight:bold}.week-block{display:grid;grid-template-columns:minmax(155px,.55fr) minmax(570px,2.5fr) minmax(155px,.55fr);gap:8px;margin-bottom:9px}.week-label{display:block;min-height:100%;border:1px solid var(--line);border-radius:6px;background:#fbf8f1;padding:9px}.week-label:first-child{border-top:3px solid #7d9dbc}.week-label:last-child{border-top:3px solid #8ca979}.week-label strong{display:block;margin-bottom:6px;font-size:12px}.week-label textarea,.side-panel textarea{width:100%;min-height:92px;resize:vertical;border:0;border-top:1px solid var(--line);background:transparent;padding:7px 1px;outline:0;color:var(--ink)}.week-label textarea:not(:placeholder-shown),.side-panel textarea:not(:placeholder-shown),.note:not(:placeholder-shown){border-color:#e5c56f;background:var(--amber);color:#4f3b11}.week-label textarea:not(:placeholder-shown),.side-panel textarea:not(:placeholder-shown){border:1px solid #e5c56f;border-radius:4px;padding:7px}.week-days{display:grid;grid-template-columns:repeat(7,minmax(0,1fr));gap:8px}.dow{grid-column:1/-1;display:grid;grid-template-columns:repeat(7,minmax(0,1fr));gap:8px;color:#616b68;font-weight:bold;font-size:12px}.dow span{text-align:left}.day{min-height:116px;border:1px solid var(--line);border-radius:7px;background:#fffdf8;padding:8px;overflow:hidden}.day.out{background:#edf0ea;color:#9a9a94}.date{font-weight:bold;margin-bottom:6px}.task{display:flex;align-items:flex-start;gap:4px;margin:4px 0;padding:3px 5px;border-radius:5px;background:var(--chip);color:#17504c;min-width:0;font-size:11px;line-height:1.35}.task.custom{background:var(--blue);color:var(--blue-ink);border-left:3px solid #638caf}.task.done{background:var(--done);color:#64755e;text-decoration:line-through}.task span{flex:1;min-width:0;overflow-wrap:anywhere}.task button{flex:0 0 auto;border:0;background:transparent;color:inherit;font-size:14px;line-height:15px;padding:0 1px}.note{width:100%;border:0;border-top:1px solid var(--line);background:transparent;padding:5px 0;outline:0;color:var(--muted);font-size:12px}.side-panel{height:max-content}.side-panel h3{margin:0 0 10px;font-size:15px}.side-panel section:first-child h3{color:var(--blue-ink)}.side-panel section:last-child h3{color:#58734b}.side-panel section+section{border-top:1px solid var(--line);margin-top:14px;padding-top:14px}.side-panel textarea{min-height:150px;border:1px solid var(--line);border-radius:5px;padding:8px;background:#fff}.year-grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:16px}.mini{background:var(--paper);border:1px solid var(--line);border-radius:7px;padding:13px;min-width:0}.mini h3{margin:0 0 9px;color:var(--blue-ink);font-size:16px}.overview-week{border-top:1px solid var(--line);padding:9px 0}.overview-week:first-of-type{border-top:0}.overview-week strong{display:block;color:#52635f;font-size:12px}.overview-week p{min-height:20px;margin:4px 0 0;color:var(--ink);font-size:13px;line-height:1.55;white-space:pre-wrap}.overview-week.empty p{color:var(--muted)}.hidden{display:none}@media(max-width:1180px){.layout{grid-template-columns:1fr}.side-panel{display:grid;grid-template-columns:1fr 1fr;gap:18px}.side-panel section+section{border-top:0;border-left:1px solid var(--line);margin:0;padding:0 0 0 18px}.year-grid{grid-template-columns:repeat(2,minmax(0,1fr))}}@media(max-width:800px){main{padding:18px 12px}.top{align-items:start;flex-direction:column}.toolbar{align-items:stretch}.month-select{margin-left:0}#taskInput{width:100%}.week-block{display:block}.week-label{margin:7px 0}.week-days{gap:4px}.dow{gap:4px}.day{min-height:86px;padding:5px;font-size:12px}.side-panel{display:block}.side-panel section+section{border-left:0;border-top:1px solid var(--line);margin-top:14px;padding:14px 0 0}.year-grid{grid-template-columns:1fr}}
  </style>
</head>
<style>
  .layout{display:block}
  .week-block{grid-template-columns:160px minmax(0,1fr) 160px}
  .note{width:84px}
  .side-panel{display:grid;grid-template-columns:1fr 1fr;gap:18px;margin-top:18px;height:auto}
  .side-panel section+section{border-top:0;border-left:1px solid var(--line);margin:0;padding:0 0 0 18px}
  .side-panel textarea{min-height:120px}
  @media(max-width:800px){.side-panel{display:block}.side-panel section+section{border-left:0;border-top:1px solid var(--line);margin-top:14px;padding:14px 0 0}.week-block{display:block}}
</style>
<style>
  :root{--ink:#613e3b;--muted:#86796c;--paper:#f0ebe2;--wash:#f0ebe2;--line:#cbc0aa;--accent:#613e3b;--chip:#f0ebe2;--blue:#f0ebe2;--blue-ink:#613e3b;--amber:#f0ebe2;--amber-ink:#613e3b;--done:#cbc0aa;--danger:#ca7159}
  body{background:#f0ebe2;color:#613e3b}
  .top{border-color:#cbc0aa}.eyebrow{color:#ca7159}.tabs{border-color:#cbc0aa}.tabs button{background:#f0ebe2;color:#613e3b}.tabs .active{background:#613e3b}
  .control{color:#86796c}.control input,.month-select select,.month-select button{border-color:#cbc0aa;background:#f0ebe2;color:#613e3b}.add{background:#613e3b}.backup-actions button{border-color:#ca7159;background:#f0ebe2;color:#613e3b}.backup-actions button:hover{border-color:#613e3b;background:#f3d18e}
  .calendar-panel,.side-panel,.mini{background:#f0ebe2;border-color:#cbc0aa}.month-title span,.mini h3{color:#ca7159}.week-label{background:#f0ebe2;border-color:#cbc0aa}.week-label:first-child{border-top-color:#ca7159}.week-label:last-child{border-top-color:#613e3b}.week-label textarea,.side-panel textarea{border-color:#cbc0aa}
  .week-label textarea:not(:placeholder-shown),.side-panel textarea:not(:placeholder-shown),.note:not(:placeholder-shown){border-color:#ca7159;background:#f0ebe2;color:#613e3b;box-shadow:inset 3px 0 0 #ca7159}.week-label textarea:not(:placeholder-shown),.side-panel textarea:not(:placeholder-shown){border-color:#ca7159}
  .week-label strong{font-size:11px}.week-label textarea{font-size:11px;line-height:1.45}.note{font-size:10px;color:#86796c}.note::placeholder{color:#a59a8a}
  .day{background:#f0ebe2;border-color:#cbc0aa}.day.out{background:#cbc0aa;color:#86796c}.task{background:#f0ebe2;color:#613e3b;border-left:3px solid #cbc0aa}.task.custom{background:#f0ebe2;color:#613e3b;border-left-color:#ca7159}.task.done{background:#cbc0aa;color:#613e3b}.note{border-color:#cbc0aa}.side-panel section:first-child h3{color:#ca7159}.side-panel section:last-child h3{color:#613e3b}.side-panel section+section,.overview-week{border-color:#cbc0aa}.overview-week strong{color:#613e3b}.overview-week.empty p{color:#86796c}
</style>
<body>
  <main>
    <header class="top"><div><div class="eyebrow">2026 工作规划</div><h1>每月工作看板</h1></div><div class="tabs"><button class="active" data-view="month">月历</button><button data-view="year">4 - 12 月总览</button></div></header>
    <section class="toolbar"><label class="control">日期<input id="taskDate" type="date"></label><label class="control">新增任务<input id="taskInput" placeholder="输入任务名称"></label><button class="add" id="addTask">添加</button><div class="backup-actions"><button id="exportBackup" type="button">导出备份</button><button id="importBackup" type="button">导入恢复</button><input id="backupFile" type="file" accept="application/json" hidden></div><div class="month-select"><button id="prev" title="上个月">‹</button><select id="month"></select><button id="next" title="下个月">›</button></div></section>
    <div id="monthView" class="layout"><section class="calendar-panel"><div class="month-title"><h2 id="heading"></h2><span id="period"></span></div><div id="calendar"></div></section><aside class="side-panel"><section><h3>待办</h3><textarea id="globalTodo" placeholder="记录本月待办..."></textarea></section><section><h3>完结</h3><textarea id="globalDone" placeholder="记录本月完结事项..."></textarea></section></aside></div>
    <section id="yearView" class="year-grid hidden"></section>
  </main>
  <script>
    const YEAR=2026, months=['一月','二月','三月','四月','五月','六月','七月','八月','九月','十月','十一月','十二月'];
    const initial=[['2026-06-01','接待'],['2026-06-03','接待'],['2026-06-22','仿品'],['2026-06-24','油厂'],['2026-06-25','预算会议'],['2026-06-29','PPT'],['2026-06-30','半年度复盘会议'],['2026-07-01','休假'],['2026-07-02','做复盘 PPT'],['2026-07-02','36 外壳'],['2026-07-02','跟进法规'],['2026-07-03','CM / F 衍生'],['2026-07-03','Newsletter'],['2026-07-07','培训'],['2026-07-08','两封邮件'],['2026-07-08','培训'],['2026-07-09','培训'],['2026-07-10','培训'],['2026-07-13','客户来访'],['2026-07-15','HK 递签'],['2026-07-25','德国出差'],['2026-07-26','德国出差'],['2026-08-01','德国出差'],['2026-08-02','德国出差'],['2026-08-16','德国出差'],['2026-08-30','德国出差'],['2026-11-11','家长会']].map(([date,text],i)=>({id:'seed-'+i,date,text}));
    const storageKeys=['t6-custom-tasks','t6-deleted-tasks','t6-done-tasks','t6-day-notes','t6-week-notes','t6-board-todo-text','t6-board-done-text'];
    const get=(key,fallback)=>{try{return JSON.parse(localStorage.getItem(key))??fallback}catch{return fallback}}, set=(key,value)=>localStorage.setItem(key,JSON.stringify(value));
    let current=6, custom=get('t6-custom-tasks',[]), deleted=get('t6-deleted-tasks',[]), done=get('t6-done-tasks',[]), notes=get('t6-day-notes',{}), weeks=get('t6-week-notes',{});
    const $=id=>document.getElementById(id), key=d=>`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`, safe=s=>String(s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
    for(let i=3;i<12;i++)$('month').insertAdjacentHTML('beforeend',`<option value="${i}">${months[i]} ${YEAR}</option>`);$('month').value=current;
    $('taskDate').value='2026-07-01'; $('globalTodo').value=localStorage.getItem('t6-board-todo-text')||''; $('globalDone').value=localStorage.getItem('t6-board-done-text')||'';
    function tasks(date){return [...initial,...custom].filter(t=>t.date===date&&!deleted.includes(t.id))}
    function dow(){return '<div class="dow"><span>周日</span><span>周一</span><span>周二</span><span>周三</span><span>周四</span><span>周五</span><span>周六</span></div>'}
    function weekHtml(days,weekId,mini=false){let cells=days.map(d=>{let ds=key(d), inMonth=d.getMonth()===current, ts=tasks(ds);return `<div class="day ${inMonth?'':'out'}"><div class="date">${d.getDate()}</div>${ts.map(t=>`<div class="task ${t.id.startsWith('custom-')?'custom ':''}${done.includes(t.id)?'done':''}" title="${safe(t.text)}"><button onclick="toggle('${t.id}')" title="完成">${done.includes(t.id)?'↺':'✓'}</button><span>${safe(t.text)}</span><button onclick="removeTask('${t.id}')" title="删除">×</button></div>`).join('')}${inMonth&&!mini?`<input class="note" value="${safe(notes[ds]||'')}" placeholder="当天记录" onchange="saveNote('${ds}',this.value)">`:''}</div>`}).join('');return `${!mini?dow():''}<div class="week-days">${cells}</div>`}
    function render(){ $('heading').textContent=months[current]+'月历'; $('period').textContent=`${YEAR}-${String(current+1).padStart(2,'0')}`;let firstDay=new Date(YEAR,current,1).getDay(),html='';for(let w=0;w<6;w++){let days=Array.from({length:7},(_,i)=>new Date(YEAR,current,1-firstDay+w*7+i));if(w>0&&days[0].getMonth()!==current&&days[6].getMonth()!==current)break;let id=`${YEAR}-${current}-${w}`;html+=`<div class="week-block"><label class="week-label"><strong>本周待办</strong><textarea placeholder="写下本周待办..." onchange="saveWeek('${id}-todo',this.value)">${safe(weeks[id+'-todo']||'')}</textarea></label><div>${weekHtml(days,id)}</div><label class="week-label"><strong>本周完结</strong><textarea placeholder="写下本周完结..." onchange="saveWeek('${id}-done',this.value)">${safe(weeks[id+'-done']||'')}</textarea></label></div>`}$('calendar').innerHTML=html;renderYear()}
    function renderYear(){let out='';for(let m=3;m<12;m++){let firstDay=new Date(YEAR,m,1).getDay(),weeksHtml='';for(let w=0;w<6;w++){let days=Array.from({length:7},(_,i)=>new Date(YEAR,m,1-firstDay+w*7+i));if(w>0&&days[0].getMonth()!==m&&days[6].getMonth()!==m)break;let start=days[0],end=days[6],id=`${YEAR}-${m}-${w}-done`,text=weeks[id]||'';weeksHtml+=`<section class="overview-week ${text.trim()?'':'empty'}"><strong>${String(start.getMonth()+1).padStart(2,'0')}/${String(start.getDate()).padStart(2,'0')} - ${String(end.getMonth()+1).padStart(2,'0')}/${String(end.getDate()).padStart(2,'0')} 本周完结</strong><p>${text.trim()?safe(text):'暂无记录'}</p></section>`}out+=`<article class="mini"><h3>${months[m]} ${YEAR}</h3>${weeksHtml}</article>`}$('yearView').innerHTML=out}
    window.saveNote=(date,value)=>{notes[date]=value;set('t6-day-notes',notes)};window.saveWeek=(id,value)=>{weeks[id]=value;set('t6-week-notes',weeks)};window.toggle=id=>{done=done.includes(id)?done.filter(x=>x!==id):[...done,id];set('t6-done-tasks',done);render()};window.removeTask=id=>{deleted=[...new Set([...deleted,id])];set('t6-deleted-tasks',deleted);custom=custom.filter(t=>t.id!==id);set('t6-custom-tasks',custom);render()};
    function exportBackup(){const data={version:1,exportedAt:new Date().toISOString(),data:Object.fromEntries(storageKeys.map(key=>[key,localStorage.getItem(key)]))},blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'}),url=URL.createObjectURL(blob),link=document.createElement('a');link.href=url;link.download=`每月工作看板备份-${new Date().toISOString().slice(0,10)}.json`;link.click();URL.revokeObjectURL(url)}
    function importBackup(file){const reader=new FileReader();reader.onload=()=>{try{const backup=JSON.parse(String(reader.result));if(!backup||backup.version!==1||!backup.data||typeof backup.data!=='object')throw new Error('invalid');if(!confirm('导入会覆盖此浏览器目前的看板记录，是否继续？'))return;storageKeys.forEach(key=>{const value=backup.data[key];value===null||value===undefined?localStorage.removeItem(key):localStorage.setItem(key,String(value))});location.reload()}catch{alert('无法读取这份备份文件，请选择由本看板导出的 JSON 备份。')}};reader.readAsText(file,'utf-8')}
    $('addTask').onclick=()=>{let date=$('taskDate').value,text=$('taskInput').value.trim();if(!date||!text)return;custom.push({id:'custom-'+Date.now(),date,text});set('t6-custom-tasks',custom);$('taskInput').value='';current=Number(date.slice(5,7))-1;$('month').value=current;render()};$('taskInput').addEventListener('keydown',e=>{if(e.key==='Enter')$('addTask').click()});$('exportBackup').onclick=exportBackup;$('importBackup').onclick=()=>$('backupFile').click();$('backupFile').onchange=e=>{const file=e.target.files?.[0];if(file)importBackup(file);e.target.value=''};$('month').onchange=e=>{current=Number(e.target.value);render()};$('prev').onclick=()=>{current=current===3?11:current-1;$('month').value=current;render()};$('next').onclick=()=>{current=current===11?3:current+1;$('month').value=current;render()};$('globalTodo').oninput=e=>localStorage.setItem('t6-board-todo-text',e.target.value);$('globalDone').oninput=e=>localStorage.setItem('t6-board-done-text',e.target.value);document.querySelectorAll('[data-view]').forEach(b=>b.onclick=()=>{document.querySelectorAll('[data-view]').forEach(x=>x.classList.toggle('active',x===b));$('monthView').classList.toggle('hidden',b.dataset.view==='year');$('yearView').classList.toggle('hidden',b.dataset.view!=='year')});render();
  </script>
</body>
</html>
